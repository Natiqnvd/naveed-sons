<style>

  *{ box-sizing:border-box; }

  .actions{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
  .btn{ display:inline-flex; align-items:center; gap:9px; font-weight:600; font-size:15px;
    padding:13px 24px; border-radius:100px; transition:transform .2s, box-shadow .2s; }
  .btn-primary{ background:linear-gradient(145deg,var(--accent-3),var(--accent-2)); color:#fff;
    box-shadow:0 14px 30px -12px rgba(0,137,226,.6); }
  .btn-primary:hover{ transform:translateY(-2px); }
  .btn-ghost{ border:1px solid var(--line); color:var(--text); background:rgba(20,45,75,.03); }
  .btn-ghost:hover{ transform:translateY(-2px); }
</style>
</head>
